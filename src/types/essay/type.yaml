name: Essay
description: Single essay or long-form non-fiction
default_preset: a5
sections:
    - cover
    - title_page
    - toc
    - content
    - backcover
    - about
    - colophon
typography:
    paragraph_indent: 1.5rem
    paragraph_spacing: "0"
    text_align: justify
    first_paragraph_indent: false
    heading_style: serif
    blockquote_style: italic
    scene_break: "---"
    chapter_opening: medium
    line_height: "1.6"
    hyphenation: true
    orphans_widows: 2
    part_heading: label_number_title
    chapter_heading: title
dirs:
    - outline
    - manuscript
    - arguments
    - concepts
    - contributors
    - notes
    - reference
    - assets
    - build
files:
    - style.yaml
    - synopsis.md
    - thesis.md
    - backcover.md
add_commands:
    - chapter
    - part
    - argument
    - concept
    - note
    - dedication
    - preface
    - foreword
    - afterword
    - appendix
    - author-note
reports:
    - status
schemas:
    manuscript:
        required: [title]
        optional: [draft]
    arguments:
        required: [claim]
        optional: [related]
    concepts:
        required: [term]
        optional: [related]
    contributors:
        required: [name]
        optional: [roles]
sample_files:
    outline/structure.md:
        body: "# Structure\n\nOutline the argument and sections here...\n"
    manuscript/01-introduction.md:
        frontmatter:
            chapter: 1
            title: "Introduction"
            draft: 1
        body: "# Introduction\n\nStart writing here...\n"
    arguments/example.md:
        frontmatter:
            claim: ""
            related: []
        body: "# Argument\n\n## Support\n\n## Counterpoint\n"
    concepts/example.md:
        frontmatter:
            term: ""
            related: []
        body: "# Concept\n\nDefinition...\n"
    notes/ideas.md:
        body: "# Ideas\n\nFree-form notes, ideas, research...\n"
