name: Paper
description: Academic paper with bibliography
dirs:
    - outline
    - manuscript
    - concepts
    - contributors
    - notes
    - reference
    - assets
    - build
files:
    - style.yaml
    - synopsis.md
    - abstract.md
    - backcover.md
    - bibliography.yaml
add_commands:
    - chapter
    - concept
    - note
    - source
reports:
    - status
schemas:
    manuscript:
        required: [title]
        optional: [draft, author]
    concepts:
        required: [term]
        optional: [related]
    contributors:
        required: [name]
        optional: [roles]
sample_files:
    outline/structure.md:
        body: "# Structure\n\nOutline the argument and sections here...\n"
    manuscript/01-introduction.md:
        frontmatter:
            chapter: 1
            title: "Introduction"
            draft: 1
        body: "# Introduction\n\nStart writing here...\n"
    concepts/example.md:
        frontmatter:
            term: ""
            related: []
        body: "# Concept\n\nDefinition...\n"
    notes/ideas.md:
        body: "# Ideas\n\nFree-form notes, research...\n"
