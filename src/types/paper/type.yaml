name: Paper
description: Academic paper with bibliography
features:
    supports_parts: false
sections:
    - title_block
    - abstract
    - content
    - bibliography
typography:
    paragraph_indent: "0"
    paragraph_spacing: 0.5rem
    text_align: justify
    first_paragraph_indent: false
    heading_style: bold
    blockquote_style: indent
    scene_break: "---"
    chapter_opening: small
    line_height: "2.0"
    hyphenation: true
    orphans_widows: 3
    chapter_heading: title
    running_header: false
    mirror_margins: false
dirs:
    - outline
    - manuscript
    - concepts
    - contributors
    - notes
    - reference
    - assets
    - build
files:
    - style.yaml
    - synopsis.md
    - abstract.md
    - bibliography.yaml
add_commands:
    - chapter
    - concept
    - note
    - source
    - appendix
reports:
    - status
schemas:
    manuscript:
        required: [title]
        optional: [draft, author]
    concepts:
        required: [term]
        optional: [related]
    contributors:
        required: [name]
        optional: [roles]
sample_files:
    outline/structure.md:
        body: "# Structure\n\nOutline the argument and sections here...\n"
    manuscript/01-introduction.md:
        frontmatter:
            chapter: 1
            title: "Introduction"
            draft: 1
        body: "# Introduction\n\nStart writing here...\n"
    concepts/example.md:
        frontmatter:
            term: ""
            related: []
        body: "# Concept\n\nDefinition...\n"
    notes/ideas.md:
        body: "# Ideas\n\nFree-form notes, research...\n"
