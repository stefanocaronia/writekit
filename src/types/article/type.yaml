name: Article
description: Article or short non-fiction — the simplest structure
sections:
    - content
typography:
    paragraph_indent: "0"
    paragraph_spacing: 0.3rem
    text_align: left
    first_paragraph_indent: false
    heading_style: bold
    blockquote_style: indent
    scene_break: "---"
    chapter_opening: small
    line_height: "1.5"
    hyphenation: false
    orphans_widows: 2
dirs:
    - manuscript
    - contributors
    - notes
    - reference
    - assets
    - build
files:
    - style.yaml
    - synopsis.md
add_commands:
    - chapter
    - note
reports:
    - status
schemas:
    manuscript:
        required: [title]
        optional: [draft]
    contributors:
        required: [name]
        optional: [roles]
sample_files:
    manuscript/01-draft.md:
        frontmatter:
            title: "Draft"
            draft: 1
        body: "# Draft\n\nStart writing here...\n"
    notes/ideas.md:
        body: "# Ideas\n\nFree-form notes, research...\n"
