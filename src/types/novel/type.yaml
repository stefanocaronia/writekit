name: Novel
description: Novel, novella, or long-form fiction
default_preset: a5
sections:
    - cover
    - title_page
    - toc
    - content
    - backcover
    - about
    - colophon
typography:
    paragraph_indent: 1.5rem
    paragraph_spacing: "0"
    text_align: justify
    first_paragraph_indent: false
    heading_style: serif
    blockquote_style: italic
    scene_break: "* * *"
    chapter_opening: large
    line_height: "1.6"
    hyphenation: true
    orphans_widows: 2
    part_heading: label_number_title
    chapter_heading: title
dirs:
    - outline
    - outline/chapters
    - manuscript
    - characters
    - world
    - contributors
    - notes
    - reference
    - assets
    - build
files:
    - style.yaml
    - timeline.yaml
    - synopsis.md
    - backcover.md
    - outline/plot.md
add_commands:
    - chapter
    - part
    - character
    - location
    - note
    - event
    - dedication
    - preface
    - foreword
    - prologue
    - epilogue
    - afterword
    - appendix
    - author-note
reports:
    - status
    - cast
    - relationships
    - locations
    - timeline
schemas:
    manuscript:
        required: [chapter, title]
        optional: [pov, draft, author]
    outline/chapters:
        required: [chapter, title]
        optional: [pov, characters, location]
    characters:
        required: [name, role]
        optional: [aliases, age, relationships]
    world:
        required: [name, type]
        optional: []
    contributors:
        required: [name]
        optional: [roles]
sample_files:
    outline/chapters/01.md:
        frontmatter:
            chapter: 1
            title: "Chapter One"
            pov: ""
            characters: []
            location: ""
        body: "# Chapter 1 — Outline\n\nWhat happens in this chapter...\n"
    manuscript/01-chapter-one.md:
        frontmatter:
            chapter: 1
            title: "Chapter One"
            pov: ""
            draft: 1
        body: "# Chapter One\n\nStart writing here...\n"
    characters/protagonist.md:
        frontmatter:
            name: ""
            role: protagonist
            aliases: []
            age: ""
            relationships: []
        body: "# Character Name\n\n## Appearance\n\n## Personality\n\n## Backstory\n\n## Arc\n\n## Notes\n"
    world/example-location.md:
        frontmatter:
            name: ""
            type: location
        body: "# Location Name\n\n## Description\n\n## Details\n\n## Notes\n"
    notes/ideas.md:
        body: "# Ideas\n\nFree-form notes, ideas, research...\n"
