name: Collection
description: Anthology of short stories, poems, or essays — per-piece author in frontmatter
default_preset: screen
config_extra:
    publication:
        edition: 1
    build:
        cover: ""
features:
    show_chapter_author: true
sections:
    - cover
    - title_page
    - toc
    - content
    - backcover
    - about
    - colophon
typography:
    paragraph_indent: 1.5rem
    paragraph_spacing: "0"
    text_align: justify
    first_paragraph_indent: false
    heading_style: serif
    blockquote_style: italic
    scene_break: "* * *"
    chapter_opening: large
    line_height: "1.6"
    hyphenation: true
    orphans_widows: 2
    part_heading: label_number_title
    chapter_heading: title
dirs:
    - outline
    - manuscript
    - contributors
    - notes
    - reference
    - assets
    - build
files:
    - style.yaml
    - synopsis.md
    - backcover.md
add_commands:
    - chapter
    - part
    - note
    - dedication
    - preface
    - foreword
    - afterword
    - appendix
    - author-note
reports:
    - status
schemas:
    manuscript:
        required: [title]
        optional: [chapter, author, draft]
    contributors:
        required: [name]
        optional: [roles]
sample_files:
    style.yaml:
        body: |
            pov: third-person
            tense: past
            tone: ""
            voice: ""
            rules: []
    synopsis.md:
        body: "# Synopsis\n\nWrite your synopsis here...\n"
    backcover.md:
        body: "# Back Cover\n\nWrite the back cover text here \u2014 this is the pitch your reader sees when they pick up the book.\n"
    outline/contents.md:
        body: "# Contents\n\nList and order of pieces in this collection...\n"
    manuscript/01-untitled.md:
        frontmatter:
            chapter: 1
            title: "Untitled"
            author: ""
            draft: 1
        body: "# Untitled\n\nStart writing here...\n"
    notes/ideas.md:
        body: "# Ideas\n\nFree-form notes, ideas, research...\n"
